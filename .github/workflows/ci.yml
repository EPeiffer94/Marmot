name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: Build (release)
        run: swift build -c release
      - name: Run tests
        run: swift test

  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint (if not preinstalled)
        run: which swiftlint || brew install swiftlint
      - name: Lint
        run: swiftlint --quiet
