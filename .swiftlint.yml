included:
  - Sources
  - Tests

disabled_rules:
  - trailing_comma
  - todo
  - opening_brace # SwiftUI-style trailing closures trip this

line_length:
  warning: 160
  error: 220
  ignores_comments: true

type_body_length:
  warning: 450
  error: 700

file_length:
  warning: 650
  error: 1000

function_body_length:
  warning: 90
  error: 140

cyclomatic_complexity:
  warning: 18
  error: 30

identifier_name:
  min_length: 1
  max_length: 60

nesting:
  type_level: 3
